<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newdle Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FAF8F3;
      --surface:   #F3EFE5;
      --border:    rgba(60, 45, 20, 0.12);
      --text:      #1A1612;
      --muted:     #7A6E60;
      --green-bg:  #EAF4EC;
      --green-fg:  #1D6B35;
      --amber-bg:  #FFF4DE;
      --amber-fg:  #8C5A00;
      --red-bg:    #FDECEA;
      --red-fg:    #9B2B25;
      --dot:       #E8533A;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2.5rem 2rem 1.5rem;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .wordmark {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 1.5rem;
      letter-spacing: -0.01em;
      color: var(--text);
      text-decoration: none;
    }

    .wordmark .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dot);
      margin-left: 1px;
      margin-bottom: 2px;
      vertical-align: middle;
    }

    .label {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    main {
      flex: 1;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      padding: 0 2rem 4rem;
    }

    .status-banner {
      border-radius: 12px;
      padding: 2rem 2rem 1.75rem;
      margin-bottom: 2rem;
      border: 1px solid transparent;
      transition: background 0.3s;
    }

    .status-banner.ok    { background: var(--green-bg); border-color: rgba(29,107,53,0.15); }
    .status-banner.warn  { background: var(--amber-bg); border-color: rgba(140,90,0,0.15); }
    .status-banner.down  { background: var(--red-bg);   border-color: rgba(155,43,37,0.15); }

    .status-dot-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ok   .pulse-dot { background: #2A9E4F; box-shadow: 0 0 0 0 rgba(42,158,79,0.4); animation: pulse-green 2s infinite; }
    .warn .pulse-dot { background: #C17D0A; }
    .down .pulse-dot { background: #C13A33; box-shadow: 0 0 0 0 rgba(193,58,51,0.4); animation: pulse-red 2s infinite; }

    @keyframes pulse-green { 0%,100% { box-shadow: 0 0 0 0 rgba(42,158,79,0.4); } 50% { box-shadow: 0 0 0 5px rgba(42,158,79,0); } }
    @keyframes pulse-red   { 0%,100% { box-shadow: 0 0 0 0 rgba(193,58,51,0.4); } 50% { box-shadow: 0 0 0 5px rgba(193,58,51,0); } }

    .status-eyebrow {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .ok   .status-eyebrow { color: var(--green-fg); }
    .warn .status-eyebrow { color: var(--amber-fg); }
    .down .status-eyebrow { color: var(--red-fg); }

    .status-headline {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 1.9rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
    }
    .ok   .status-headline { color: var(--green-fg); }
    .warn .status-headline { color: var(--amber-fg); }
    .down .status-headline { color: var(--red-fg); }

    .status-message {
      font-size: 0.9375rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .eta-row {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
    }
    .eta-row .eta-label { color: var(--muted); }
    .eta-row .eta-value { font-weight: 500; }
    .warn .eta-value { color: var(--amber-fg); }
    .down .eta-value { color: var(--red-fg); }

    .services-section {
      margin-bottom: 2rem;
    }

    .section-heading {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .service-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--border);
    }
    .service-row:first-of-type { border-top: 1px solid var(--border); }

    .service-name {
      font-size: 0.9375rem;
      font-weight: 400;
    }

    .service-badge {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.2em 0.7em;
      border-radius: 100px;
    }
    .badge-ok   { background: var(--green-bg); color: var(--green-fg); }
    .badge-warn { background: var(--amber-bg); color: var(--amber-fg); }
    .badge-down { background: var(--red-bg);   color: var(--red-fg); }

    .incidents-section { margin-bottom: 2rem; }

    .incident-card {
      background: var(--surface);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 0.75rem;
    }

    .incident-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.35rem;
    }

    .incident-title {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    .incident-date {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 0.15rem;
    }

    .incident-body {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .incident-status {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .incident-status::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }
    .incident-status.resolved::before { background: var(--green-fg); }
    .incident-status.monitoring::before { background: var(--amber-fg); }
    .incident-status.investigating::before { background: var(--red-fg); }

    footer {
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      padding: 1.5rem 2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
      gap: 1rem;
      flex-wrap: wrap;
    }

    footer a { color: var(--muted); text-decoration: underline; text-underline-offset: 3px; }

    #last-checked { font-size: 0.75rem; color: var(--muted); }

    .loading { text-align: center; padding: 4rem 2rem; color: var(--muted); font-size: 0.9rem; }
    .error-note { background: var(--red-bg); color: var(--red-fg); border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.875rem; margin-bottom: 1.5rem; }

    @media (max-width: 480px) {
      header, main, footer { padding-left: 1.25rem; padding-right: 1.25rem; }
      .status-headline { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <a href="https://newdle.app" class="wordmark">newdle</a>
  <span class="label">Status</span>
</header>

<main>
  <div id="app"><div class="loading">Checking status…</div></div>
</main>

<footer>
  <span id="last-checked"></span>
  <a href="https://github.com/ContextPress/status" target="_blank">View on GitHub</a>
</footer>

<script>
  const STATUS_URL = './status.json';
  const REFRESH_MS = 60_000;

  function fmt(iso) {
    if (!iso) return null;
    const d = new Date(iso);
    return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
  }

  function state(data) {
    if (data.maintenance) return 'down';
    if (data.degraded)    return 'warn';
    return 'ok';
  }

  function defaultTitle(s) {
    if (s === 'down') return 'Under Maintenance';
    if (s === 'warn') return 'Partial Disruption';
    return 'All Systems Operational';
  }

  function badgeClass(s) {
    return s === 'operational' ? 'badge-ok' : s === 'degraded' ? 'badge-warn' : 'badge-down';
  }

  function render(data) {
    const s = state(data);
    const title = data.title || defaultTitle(s);
    const showEta = data.estimated_end && (s === 'warn' || s === 'down');
    const eta = showEta ? `<div class="eta-row"><span class="eta-label">Estimated recovery:</span><span class="eta-value">${fmt(data.estimated_end)}</span></div>` : '';
    const msg = data.message ? `<p class="status-message">${data.message}</p>${eta}` : '';

    let servicesHtml = '';
    if (data.services && data.services.length) {
      const rows = data.services.map(sv => `
        <div class="service-row">
          <span class="service-name">${sv.name}</span>
          <span class="service-badge ${badgeClass(sv.status)}">${sv.status}</span>
        </div>`).join('');
      servicesHtml = `<div class="services-section"><p class="section-heading">Services</p>${rows}</div>`;
    }

    let incidentsHtml = '';
    if (data.incidents && data.incidents.length) {
      const cards = data.incidents.map(inc => `
        <div class="incident-card">
          <div class="incident-header">
            <span class="incident-title">${inc.title}</span>
            <span class="incident-date">${fmt(inc.date)}</span>
          </div>
          <div class="incident-status ${inc.status || 'resolved'}">${inc.status || 'resolved'}</div>
          <p class="incident-body">${inc.body}</p>
        </div>`).join('');
      incidentsHtml = `<div class="incidents-section"><p class="section-heading">Incident history</p>${cards}</div>`;
    }

    document.getElementById('app').innerHTML = `
      <div class="status-banner ${s}">
        <div class="status-dot-row">
          <div class="pulse-dot"></div>
          <span class="status-eyebrow">${s === 'ok' ? 'Operational' : s === 'warn' ? 'Degraded' : 'Maintenance'}</span>
        </div>
        <h1 class="status-headline">${title}</h1>
        ${msg}
      </div>
      ${servicesHtml}
      ${incidentsHtml}
    `;

    document.getElementById('last-checked').textContent = `Last checked ${fmt(new Date().toISOString())}`;
  }

  function renderError(err) {
    document.getElementById('app').innerHTML = `<div class="error-note">Could not load status.json — ${err.message}</div>`;
    document.getElementById('last-checked').textContent = `Failed at ${fmt(new Date().toISOString())}`;
  }

  async function load() {
    try {
      const res = await fetch(`${STATUS_URL}?t=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      render(await res.json());
    } catch(e) { renderError(e); }
  }

  load();
  setInterval(load, REFRESH_MS);
</script>
</body>
</html>
